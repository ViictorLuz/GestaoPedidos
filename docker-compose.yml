services:
  postgres-db:
    image: postgres:latest
    container_name: gestao_pedidos_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: senha_db_local
      POSTGRES_DB: GestaoPedidosDb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql

volumes:
  postgres_data: